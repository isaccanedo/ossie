version: 0.2.0.dev0
name: Flights
description: Ontology of flights into and out of airports.
requires:
  - COUNT[Airport] > 0         # there must be at least one Airport
  - COUNT[Carrier] > 0         # there must be at least one Carrier
ontology:
- concept:
    name: NrFeet
    description: "Unit of measure for distance in feet"
    type: ValueType
    extends: [ Decimal ]
- concept:
    name: NrPounds
    description: "Unit of measure for weight in pounds"
    type: ValueType
    extends: [ Integer ]
- concept:
    name: NrMiles
    description: "Unit of measure for distance in miles"
    type: ValueType
    extends: [ Decimal ]
- concept:
    name: NrMinutes
    description: "Unit of measure for time in minutes"
    type: ValueType
    extends: [ Decimal ]
- concept:
    name: CancelationCode
    description: "The single character code that identifies the reason a flight is canceled"
    type: ValueType
    extends: [ String ]
    requires: [ CancelationCode == 'A' OR CancelationCode == 'B' OR CancelationCode == 'C' OR CancelationCode == 'D' ]
- concept:
    name: Capacity
    description: "The capacity of an aircraft, measured in pounds."
    type: ValueType
    extends: [ NrPounds ]
- concept:
    name: DegreesLatitude
    type: ValueType
    extends: [ Decimal ]
    requires: [ DegreesLatitude <= 90, DegreesLatitude >= -90 ]
- concept:
    name: DegreesLongitude
    type: ValueType
    extends: [ Decimal ]
    requires: [ DegreesLongitude <= 180, DegreesLongitude >= -180 ]
- concept:
    name: Polygon
    description: "A polygon represented as a list of vertices, where each vertex is a pair of latitude and longitude coordinates."
    type: ValueType
    extends: [ String ]
- concept:
    name: CityName
    type: ValueType
    extends: [ String ]
- concept:
    name: Delay
    type: ValueType
    extends: [ NrMinutes ]
- concept:
    name: Distance
    type: ValueType
    extends: [ NrMiles ]
- concept:
    name: DistanceGroup
    description: "A number used to group distances of different lengths, where 1 groups the shortest and 10 the longest."
    type: ValueType
    extends: [ Integer ]
    requires: [ 1 <= DistanceGroup, DistanceGroup <= 10 ]
- concept:
    name: RunwayGeometry
    description: "A polygon that models the shape of a runway."
    type: ValueType
    extends: [ Polygon ]
- concept:
    name: RunwayLength
    description: "The unit for measuring the lengths of runways in American airports."
    type: ValueType
    extends: [ NrFeet ]
- concept:
    name: RunwayDesignator
    description: "Used to distinguish runways within a given airport."
    type: ValueType
    extends: [ String ]
- concept:
    name: SerialNr
    type: ValueType
    extends: [ String ]
- concept:
    name: StateCode
    type: ValueType
    extends: [ String ]
- concept:
    name: StateName
    type: ValueType
    extends: [ String ]
- concept:
    name: TailNr
    type: ValueType
    extends: [ String ]
- concept:
    name: Year
    type: ValueType
    extends: [ String ]
- concept:
    name: CancelationReason
    description: "A curated set of reasons that explain why a flight is canceled"
    type: EntityType
    identify_by: [ code ]
  relationships:
  - name: code
    roles:
    - concept: CancelationCode
    verbalizes: [ '{CancelationReason} is identified by {CancelationCode}']
    multiplicity: OneToOne
  - name: description
    roles:
    - concept: String
    verbalizes: [ '{CancelationReason} has description- {String}' ]  # The hyphen after "description" is significant when verbalizing constraints
    multiplicity: ManyToOne                                          # Each CancelationReason has at most one description String
- concept:
    name: State
    type: EntityType
    identify_by: [ code ]
  relationships:
  - name: code
    roles:
    - concept: StateCode
    verbalizes:
    - '{State} is identified by {StateCode}'
    multiplicity: OneToOne
  - name: name
    roles:
    - concept: StateName
    verbalizes:
    - '{State} has {StateName}'
    multiplicity: ManyToOne
- concept:
    name: City
    type: EntityType
    identify_by: [ name, state ]
  relationships:
  - name: name
    roles:
    - concept: CityName
    verbalizes:
    - '{City} has {CityName}'
    multiplicity: ManyToOne
  - name: state
    roles:
    - concept: State
    verbalizes:
    - '{City} is located in {State}'
    multiplicity: ManyToOne
- concept:
    name: Runway
    type: EntityType
    identify_by: [ designator, airport ]
  relationships:
  - name: airport
    roles:
    - concept: Airport
    verbalizes:
    - '{Runway} belongs to {Airport}'
    multiplicity: ManyToOne
  - name: designator
    roles:
    - concept: RunwayDesignator
    verbalizes:
    - '{Runway} uses {RunwayDesignator}'
    multiplicity: ManyToOne
  - name: length
    roles:
    - concept: RunwayLength
    verbalizes:
    - '{Runway} has {RunwayLength}'
    multiplicity: ManyToOne
  - name: geometry
    roles:
    - concept: RunwayGeometry
    verbalizes:
    - '{Runway} has {RunwayGeometry}'
    multiplicity: ManyToOne
- concept:
    name: ManufacturerName
    type: ValueType
    extends: [ String ]
- concept:
    name: Manufacturer
    type: EntityType
    identify_by: [ name ]
  relationships:
  - name: name
    roles:
    - concept: ManufacturerName
    verbalizes:
    - '{Manufacturer} is identified by {ManufacturerName}'
    multiplicity: OneToOne
- concept:
    name: ModelName
    type: ValueType
    extends: [ String ]
- concept:
    name: Model
    type: EntityType
    identify_by: [ name, manufacturer ]
  relationships:
  - name: name
    roles:
    - concept: ModelName
    verbalizes:
    - '{Model} has {ModelName}'
    multiplicity: ManyToOne
  - name: manufacturer
    roles:
    - concept: Manufacturer
    verbalizes:
    - '{Model} is manufactured by {Manufacturer}'
    multiplicity: ManyToOne
- concept:
    name: Aircraft
    type: EntityType
    identify_by: [ tailnum ]
  relationships:
  - name: serial_number
    roles:
    - concept: SerialNr
    verbalizes:
    - '{Aircraft} has {SerialNr}'
    multiplicity: ManyToOne
  - name: name
    roles:
    - concept: String
    verbalizes:
    - '{Aircraft} has name {String}'
    multiplicity: ManyToOne
  - name: number_of_seats
    roles:
    - concept: Integer
    verbalizes:
    - '{Aircraft} has {Integer} seats'
    multiplicity: ManyToOne
  - name: tailnum
    roles:
    - concept: TailNr
    verbalizes:
    - '{Aircraft} is identified by {TailNr}'
    multiplicity: OneToOne
  - name: model
    roles:
    - concept: Model
    verbalizes:
    - '{Aircraft} has {Model}'
    multiplicity: ManyToOne
  - name: year_manufactured
    roles:
    - concept: Year
    verbalizes:
    - '{Aircraft} was manufactured in {Year}'
    multiplicity: ManyToOne
  - name: capacity
    roles:
    - concept: Capacity
    verbalizes:
    - '{Aircraft} has {Capacity}'
    multiplicity: ManyToOne
  - name: carrier
    roles:
    - concept: Carrier
    verbalizes:
    - '{Aircraft} is operated by {Carrier}'
    multiplicity: ManyToOne
- concept:
    name: AirportName
    type: ValueType
    extends: [ String ]
- concept:
    name: AirportCode
    description: "The three-letter IATA code for the airport."
    type: ValueType
    extends: [ String ]
- concept:
    name: AirportId
    description: "Five digit number used as an alternate identifier for airports."
    type: ValueType
    extends: [ String ]
- concept:
    name: Airport
    type: EntityType
    identify_by: [ code ]
    requires: [ Airport.latitude, Airport.longitude ]
  relationships:
  - name: city
    roles:
    - concept: City
    verbalizes:
    - '{Airport} is located in {City}'
    multiplicity: ManyToOne
  - name: serves
    roles:
    - concept: Market
    verbalizes:
    - '{Airport} serves {Market}'
    multiplicity: ManyToOne
  - name: average_departure_delay
    roles:
    - concept: Delay
    verbalizes:
    - '{Airport} has average- departure {Delay}'    # The hyphen after "average" has significance when verbalizing constraints
    multiplicity: ManyToOne                         # Each Airport has at most one average departure Delay
    derived_by: [ 'Delay == AVG[Flight.departure_delay WHERE Airport == Flight.route.departure GROUP BY Airport]' ]
  - name: longitude
    roles:
    - concept: DegreesLongitude
    verbalizes:
    - '{Airport} centers at {DegreesLongitude}'
    multiplicity: ManyToOne
  - name: average_arrival_delay
    roles:
    - concept: Delay
    verbalizes:
    - '{Airport} has average- arrival {Delay}'    # The hyphen after "average" has significance when verbalizing constraints
    multiplicity: ManyToOne                       # Each Airport has at most one average arrival Delay
    derived_by: [ 'Delay == AVG[Flight.arrival_delay WHERE Airport == Flight.route.destination GROUP BY Airport]' ]
  - name: name
    roles:
    - concept: AirportName
    verbalizes:
    - '{Airport} has {AirportName}'
    multiplicity: ManyToOne
  - name: code
    roles:
    - concept: AirportCode
    verbalizes:
    - '{Airport} has {AirportCode}'
    multiplicity: OneToOne
  - name: latitude
    roles:
    - concept: DegreesLatitude
    verbalizes:
    - '{Airport} centers at {DegreesLatitude}'
    multiplicity: ManyToOne
- concept:
    name: MarketName
    type: ValueType
    extends: [ String ]
- concept:
    name: Market
    type: EntityType
    identify_by: [name]
  relationships:
    - name: name
      roles: [ { concept: MarketName }]
      verbalizes: [ '{Market} is identified by {MarketName}' ]
      multiplicity: OneToOne
- concept:
    name: FlightNr
    description: "The IATA flight number, which is typically a combination of the airline's IATA code and a numeric code (e.g., 'AA1234')."
    type: ValueType
    extends: [ String ]
- concept:
    name: FlightId
    description: "A unique identifier for an instance of a flight"
    type: ValueType
    extends: [ String ]
- concept:
    name: Flight
    type: EntityType
    identify_by: [ id ]
  relationships:
  - name: departure_delay
    roles:
    - concept: Delay
    verbalizes:
    - '{Flight} has departure- {Delay}'    # The hyphen after "departure" has significance when verbalizing constraints
    multiplicity: ManyToOne                # Each Flight has at most one departure Delay
  - name: number
    roles:
    - concept: FlightNr
    verbalizes:
    - '{Flight} has {FlightNr}'
    multiplicity: ManyToOne
  - name: scheduled_departure
    roles: [ { concept: DateTime } ]
    verbalizes:
    - '{Flight} is scheduled to depart at {DateTime}'
    multiplicity: ManyToOne
    requires: [ Flight.scheduled_departure < Flight.scheduled_arrival ]
  - name: arrival_delay
    roles:
    - concept: Delay
    verbalizes:
    - '{Flight} has arrival- {Delay}'    # The hyphen after "arrival" has significance when verbalizing constraints
    multiplicity: ManyToOne              # Each Flight has at most one arrival Delay
  - name: canceled
    verbalizes:
    - '{Flight} was canceled'
  - name: canceled_due_to
    roles:
    - concept: CancelationReason
    verbalizes:
    - '{Flight} was canceled due to {CancelationReason}'
    multiplicity: ManyToOne
  - name: distance
    roles:
    - concept: Distance
    verbalizes:
    - '{Flight} spans actual- {Distance}'    # The hyphen after "actual" has significance when verbalizing constraints
    multiplicity: ManyToOne                  # Each Flight spans at most one actual Distance
  - name: id
    roles:
    - concept: FlightId
    verbalizes:
    - '{Flight} is identified by {FlightId}'
    multiplicity: OneToOne
  - name: scheduled_arrival
    roles:
    - concept: DateTime
    verbalizes:
    - '{Flight} is scheduled to arrive at {DateTime}'
    multiplicity: ManyToOne
  - name: registers_longitude_series
    roles:
    - concept: DateTime
    - concept: DegreesLongitude
    verbalizes:
    - '{Flight} at {DateTime} registers {DegreesLongitude}'
    multiplicity: ManyToOne
  - name: registers_latitude_series
    roles:
    - concept: DateTime
    - concept: DegreesLatitude
    verbalizes:
    - '{Flight} at {DateTime} registers {DegreesLatitude}'
    multiplicity: ManyToOne
  - name: date
    roles:
    - concept: Date
    verbalizes:
    - '{Flight} is scheduled to depart on {Date}'
    multiplicity: ManyToOne
  - name: departs_at
    roles:
    - concept: DateTime
    verbalizes:
    - '{Flight} departs at {DateTime}'
    multiplicity: ManyToOne
    requires: [ Flight.departs_at < Flight.arrives_at ]
  - name: diverted
    verbalizes:
    - '{Flight} was diverted'
  - name: arrives_at
    roles:
    - concept: DateTime
    verbalizes:
    - '{Flight} arrives at {DateTime}'
    multiplicity: ManyToOne
  - name: route
    roles:
    - concept: Route
    verbalizes:
    - '{Flight} traverses {Route}'
    multiplicity: ManyToOne
  - name: aircraft
    roles:
    - concept: Aircraft
    verbalizes:
    - '{Flight} uses {Aircraft}'
    multiplicity: ManyToOne
    requires: [ Flight.operated_by(Aircraft.carrier) ]
  - name: operated_by
    roles:
    - concept: Carrier
    verbalizes:
    - '{Flight} is operated by {Carrier}'
    multiplicity: ManyToOne
- concept:
    name: CarrierCode
    description: "The two-letter IATA code for the airline carrier."
    type: ValueType
    extends: [ String ]
- concept:
    name: CarrierName
    type: ValueType
    extends: [ String ]
- concept:
    name: Carrier
    type: EntityType
    identify_by: [ code ]
  relationships:
  - name: code
    roles:
    - concept: CarrierCode
    verbalizes:
    - '{Carrier} uses {CarrierCode}'
    multiplicity: OneToOne
  - name: name
    roles:
    - concept: CarrierName
    verbalizes:
    - '{Carrier} has {CarrierName}'
    multiplicity: ManyToOne
- concept:
    name: RouteId
    type: ValueType
    description: "A unique identifier for a route between two airports. Constructed by concatenating the IATA codes of the departure and destination airports (e.g., 'ATL -> DCA')"
    extends: [ String ]
- concept:
    name: Route
    type: EntityType
    identify_by: [ id ]
  relationships:
  - name: average_departure_delay
    roles:
    - concept: Delay
    verbalizes:
    - '{Route} has average- departure {Delay}'    # The hyphen after "average" has significance when verbalizing constraints
    multiplicity: ManyToOne                       # Each Route has at most one average departure Delay
    derived_by: [ 'Delay == AVG[Flight.departure_delay WHERE Flight.route(Route) GROUP BY Route]' ]
  - name: average_arrival_delay
    roles:
    - concept: Delay
    verbalizes:
    - '{Route} has average- arrival {Delay}'    # The hyphen after "average" has significance when verbalizing constraints
    multiplicity: ManyToOne                     # Each Route has at most one average arrival Delay
    derived_by: [ 'Delay == AVG[Flight.arrival_delay WHERE Flight.route(Route) GROUP BY Route]' ]
  - name: distance
    roles:
    - concept: Distance
    verbalizes:
    - '{Route} spans {Distance}'
    multiplicity: ManyToOne
  - name: lies_in
    roles:
    - concept: DistanceGroup
    verbalizes:
    - '{Route} has {DistanceGroup}'
    multiplicity: ManyToOne
  - name: id
    roles:
    - concept: RouteId
    verbalizes:
    - '{Route} is identified by {RouteId}'
    multiplicity: OneToOne
  - name: route_name
    roles:
    - concept: String
    verbalizes:
    - '{Route} has name- {String}'    # The hyphen after "name" has significance when verbalizing constraints
    multiplicity: ManyToOne
  - name: destination
    roles:
    - concept: Airport
    verbalizes:
    - '{Route} connects to destination- {Airport}'  # The hyphen after "destination" has significance when verbalizing constraints
    multiplicity: ManyToOne                         # Each Route connects to at most one destination Airport
    requires: [ 'NOT Route.departure(Airport)' ]
  - name: departure
    roles:
    - concept: Airport
    verbalizes:
    - '{Route} connects to departure- {Airport}'    # The hyphen after "departure" has significance when verbalizing constraints
    multiplicity: ManyToOne                         # Each Route connects to at most one departure Airport
    requires: [ 'NOT Route.destination(Airport)' ]
ontology_mappings:
- name: flights_mapping
  semantic_model:
    name: Flights semantic model
    datasets:
    - name: RUNWAY
      source: DATABASE.SCHEMA.RUNWAYS
      fields:
      - name: airport_code
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: airport_code
      - name: length
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: length
      - name: shape
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: shape
      - name: designator
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: designator
    - name: AIRCRAFT
      source: DATABASE.SCHEMA.AIRCRAFT
      description: "An airplane, helicopter, or other machine capable of flight"
      fields:
      - name: serial_nr
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: serial_nr
      - name: name
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: name
      - name: nr_seats
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: nr_seats
      - name: tail_nr
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: tail_nr
      - name: carrier_code
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: carrier_code
      - name: manufacturer
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: manufacturer
      - name: model
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: model
      - name: year
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: year
      - name: capacity
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: capacity
    - name: AIRPORT
      source: DATABASE.SCHEMA.AIRPORTS
      description: "An airport that is identified by an IATA code."
      fields:
      - name: state_code
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: state_code
      - name: market_nm
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: market_nm
      - name: longitude
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: longitude
      - name: opened
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: opened
      - name: state_nm
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: state_nm
      - name: city_nm
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: city_nm
      - name: name
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: name
      - name: code
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: code
      - name: latitude
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: latitude
    - name: FLIGHT
      source: DATABASE.SCHEMA.FLIGHTS
      description: "A commercial passenger flight."
      fields:
      - name: dep_delay
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: dep_delay
      - name: air_time
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: air_time
      - name: nr
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: nr
      - name: carrier_code
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: carrier_code
      - name: duration
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: duration
      - name: scheduled_departure
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: scheduled_departure
      - name: arr_delay
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: arr_delay
      - name: cancelled
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: cancelled
      - name: cancel_code
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: cancel_code
      - name: distance
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: distance
      - name: id
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: id
      - name: scheduled_arrival
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: scheduled_arrival
      - name: wheels_on
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: wheels_on
      - name: date
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: date
      - name: wheels_off
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: wheels_off
      - name: scheduled_duration
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: scheduled_duration
      - name: tail_nr
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: tail_nr
      - name: departure
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: departure
      - name: route_id
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: route_id
      - name: diverted
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: diverted
      - name: arrival
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: arrival
    - name: CARRIER
      source: DATABASE.SCHEMA.CARRIERS
      description: "An airline, such as Delta, United, or American."
      fields:
      - name: code
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: code
      - name: name
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: name
    - name: ROUTE
      source: DATABASE.SCHEMA.ROUTES
      description: "Represents the existence of one or more flights between a pair of departure
        arrival airports."
      fields:
      - name: orig_airport_code
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: orig_airport_code
      - name: dest_airport_code
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: dest_airport_code
      - name: distance
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: distance
      - name: dist_grp
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: dist_grp
      - name: id
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: id
      - name: name
        expression:
          dialects:
          - dialect: ANSI_SQL
            expression: name
  concept_mappings:
  - concept: Runway
    object_mappings:
    - referent_mappings:
      - relationship: designator
        expression: RUNWAY.designator
      - relationship: airport
        referent_mappings:
        - relationship: code
          expression: RUNWAY.airport_code
    link_mappings:
    - object_mapping:
        referent_mappings:
        - relationship: designator
          expression: RUNWAY.designator
        - relationship: airport
          referent_mappings:
          - relationship: code
            expression: RUNWAY.airport_code
      children:
      - object_mapping:
          concept: RunwayLength
          expression: RUNWAY.length
        relationship: length
      - object_mapping:
          concept: RunwayGeometry
          expression: RUNWAY.shape
        relationship: geometry
  - concept: Manufacturer
    object_mappings:
    - referent_mappings:
      - relationship: name
        expression: AIRCRAFT.manufacturer
  - concept: Model
    object_mappings:
    - referent_mappings:
